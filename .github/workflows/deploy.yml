# Deploy Puzzle Suite to GitHub Pages
# Triggers on every push to main, and can be run manually from the Actions tab.

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:          # allows manual runs from the GitHub Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; a newer push cancels any in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── 1. Build ────────────────────────────────────────────────────────────────
  build:
    name: Build bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run esbuild
        run: bash build.sh

      - name: Remove node_modules before packaging
        run: rm -rf node_modules   # not needed at runtime; keeps artifact small

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # serve the whole repo root as-is

  # ── 2. Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
